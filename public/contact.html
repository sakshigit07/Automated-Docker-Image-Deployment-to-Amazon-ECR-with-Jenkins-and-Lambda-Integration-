<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Cozy Bean Café</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-amber-50 text-stone-800">
    <nav class="bg-amber-900 text-amber-50 p-4 flex justify-between items-center">
        <h1 class="text-2xl font-serif font-bold">☕ Cozy Bean</h1>
        <div class="space-x-6">
            <a href="/home.html" class="hover:text-amber-300">Home</a>
            <a href="/menu.html" class="hover:text-amber-300">Menu</a>
            <a href="/booking.html" class="hover:text-amber-300">Book a Table</a>
            <a href="/contact.html" class="hover:text-amber-300">Contact</a>
        </div>
    </nav>

    <main class="max-w-md mx-auto my-12 bg-white p-8 rounded-3xl shadow-xl border border-amber-100">
        <h2 class="text-3xl font-serif font-bold text-amber-900 mb-6 text-center">Get in Touch</h2>
        <form action="/api/contact" method="POST" class="space-y-4">
            <div>
                <label class="block font-medium mb-1">Name</label>
                <input type="text" name="name" required class="w-full border border-stone-300 p-2 rounded-xl focus:outline-amber-700">
            </div>
            <div>
                <label class="block font-medium mb-1">Message</label>
                <textarea name="message" rows="4" required class="w-full border border-stone-300 p-2 rounded-xl focus:outline-amber-700"></textarea>
            </div>
            <button type="submit" class="w-full bg-amber-700 text-white p-3 rounded-xl font-semibold hover:bg-amber-800 transition">Send Message</button>
        </form>
    </main>
</body>
</html>
